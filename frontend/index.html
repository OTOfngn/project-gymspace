<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymSpace — Book Your Workout</title>
    <meta name="description"
        content="GymSpace helps gym enthusiasts discover gyms, browse workout plans, and book time slots with ease.">
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>

<body>

    <header class="with-sticky-nav">
        <span id="user-display"></span>
        <h1>GymSpace</h1>
        <nav>
            <ul class="horizontal">
                <li><button id="theme-btn" class="heading">Theme</button></li>
                <!-- Navigates to ai.html when clicked.
                     window.location.href changes the browser's current URL,
                     which loads the AI Assistant page. -->
                <li><button class="heading" onclick="window.location.href='ai.html'">AI Assistant</button></li>
                <li><button id="login-btn" class="heading">Login</button></li>
            </ul>
        </nav>
    </header>

    <section> <!--Description-->
        <p class="centered heading">This is a website designed for gym enthusiasts.</p>
        <p class="centered subtitle">Here you can find information about gyms and workout plans.</p>
    </section>

    <section class="container"> <!--Main content-->
        <section> <!--Gym List-->
            <h2 class="centered">Gym List</h2>
            <nav>
                <ul class="centered" id="gym-list">
                    <li><button>Gym 1</button></li>
                    <li><button>Gym 2</button></li>
                    <li><button>Gym 3</button></li>
                </ul>
            </nav>
        </section>

        <section class="workout-section"> <!--Workout Plans-->
            <h2 id="workout-plans-title" class="centered">Workout Plans - Gym 1</h2>
            <table>

                        <th id="th-tue">Tue</th>
                        <th id="th-wed">Wed</th>
                        <th id="th-thu">Thu</th>
                        <th id="th-fri">Fri</th>
                        <th id="th-sat">Sat</th>
                        <th id="th-sun">Sun</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>8am – 10am</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>10am – 12pm</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>12pm – 2pm</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>2pm – 4pm</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>4pm – 6pm</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>6pm – 8pm</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>8pm – 10pm</td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </section>


    <footer>
        <p class="centered">Copyright © 2026 GymSpace</p>
    </footer>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-title">Login</h2>
            <input type="text" id="username-input" class="modal-input" placeholder="Username" />
            <input type="password" id="password-input" class="modal-input" placeholder="Password" />
            <div class="modal-actions">
                <button id="login-auth-btn" class="btn-primary">Login</button>
                <button id="register-auth-btn" class="btn-secondary">Register</button>
            </div>
            <button id="close-modal-btn" class="btn-close">Close</button>
        </div>
    </div>


</body>

</html>
